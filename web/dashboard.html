<html>
<head>
    <meta charset="UTF-8">
    <title>Hotel Dashboard</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #445A67, #57838D);
            color: white;
        }

        /* NAVBAR */
        .navbar {
            background-color: #445A67;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .navbar h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .logout {
            color: #F3BFB3;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .logout:hover {
            color: #CCADB2;
        }

        /* MAIN */
        .container {
            text-align: center;
            padding: 60px 20px;
        }

        .container h2 {
            margin-bottom: 50px;
            font-size: 28px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            max-width: 900px;
            margin: auto;
        }

        /* CARD */
        .card {
            background: white;
            color: #445A67;
            padding: 35px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: translateY(-10px);
            background-color: #F3BFB3;
            color: #445A67;
        }

        .card i {
            font-size: 30px;
            margin-bottom: 15px;
            display: block;
        }

        .card h3 {
            margin: 0;
            font-size: 16px;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 60px;
            background-color: #445A67;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h1><i class="fa-solid fa-hotel"></i> Ocean View Resort - Management</h1>
        <a href="/logout" class="logout">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>

    <!-- MAIN -->
    <div class="container">
        <h2>Welcome to Hotel Management Dashboard</h2>

        <div class="grid">

            <div class="card" onclick="location.href='/registerPage'">
                <i class="fa-solid fa-user-plus"></i>
                <h3>Guest Registration</h3>
            </div>

            <div class="card" onclick="location.href='/reservationPage'">
                <i class="fa-solid fa-bed"></i>
                <h3>Book a Room</h3>
            </div>

            <div class="card" onclick="location.href='/checkoutPage'">
                <i class="fa-solid fa-door-open"></i>
                <h3>Check-Out</h3>
            </div>

            <div class="card" onclick="location.href='/billPage'">
                <i class="fa-solid fa-file-invoice-dollar"></i>
                <h3>Calculate Bill</h3>
            </div>

            <div class="card" onclick="location.href='/helpPage'">
                <i class="fa-solid fa-circle-question"></i>
                <h3>Help & Support</h3>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
         © 2026 Ocean View Resort | Designed by Dashani
    </div>

</body>
</html>
